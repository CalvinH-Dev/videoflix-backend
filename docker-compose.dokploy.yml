services:
  db:
    image: postgres:latest
    container_name: videoflix_database
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${DB_PORT}:5432"
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  redis:
    image: redis:latest
    container_name: videoflix_redis
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT}:6379"

  web:
    build:
      context: .
      dockerfile: backend.Dockerfile
    env_file: .env
    container_name: videoflix_backend
    volumes:
      - .:/app
      - /var/www/videoflix/media:/app/media
      - /var/www/videoflix/static:/var/www/videoflix/static
    ports:
      - 8000
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
      - redis
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "0.5"
    #       memory: 256m
    #     reservations:
    #       memory: 64m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  videoflix_media:
  videoflix_static:
