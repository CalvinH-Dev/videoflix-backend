<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Videoflix{% endblock %}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: rgba(28, 39, 57, 1); /* --bg-color */
        font-family: Arial, sans-serif;
      }
      a {
        color: rgba(46, 62, 223, 1);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: rgba(28, 39, 57, 1)"
    >
      <tr>
        <td align="center" style="padding: 48px 16px">
          <table width="600" cellpadding="0" cellspacing="0" style="max-width: 600px; width: 100%">
            <!-- Header -->
            <tr>
              <td align="center" style="padding-bottom: 32px">
                <h1 style="margin: 0; font-size: 32px; font-weight: 900; letter-spacing: 2px">
                  <span style="color: rgba(46, 62, 223, 1)">VIDEO</span
                  ><span style="color: rgba(255, 255, 255, 1)">FLIX</span>
                </h1>
              </td>
            </tr>

            <!-- Content -->
            <tr>
              <td
                style="
                  background-color: rgba(24, 32, 46, 1);
                  border-radius: 12px;
                  overflow: hidden;
                  padding: 0;
                "
              >
                {% block content %}{% endblock %}
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td align="center" style="padding: 32px 16px 0">
                <p style="margin: 0 0 8px; color: rgb(255, 255, 255); font-size: 12px">
                  © 2026 Videoflix – {{ imprint_name }}
                </p>
                <p style="margin: 0">
                  <a href="{{ imprint_url }}" style="color: rgba(255, 231, 135, 1); font-size: 12px"
                    >Imprint</a
                  >
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
